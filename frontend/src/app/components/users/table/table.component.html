<div class="container">
    <div class="table-responsive">
        <div class="table-wrapper">
           
            <table class="table table-striped table-hover">
                <thead>
                    <tr>
                        <th *ngFor="let header of tableHeaders">{{ header }}</th>
                      </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let row of tableData">
                      <td>{{ row.cin }}</td>
                      <td>{{ row.name }}</td>
                      <td>{{ row.lastName }}</td>
                      <td>{{ row.email }}</td>
                      <td>{{ row.role }}</td>
                      <td>{{ row.team }}</td>
                      <td>{{ row.subteam }}</td>
                      <td>
                        <i class="fas fa-edit text-warning" style="cursor: pointer;" (click)="onEdit(row)" ></i>
                        <i class="fas fa-trash-alt text-danger" style="cursor: pointer; margin-left: 10px;" (click)="onDelete(row.id)" ></i>
                      </td>
                    </tr>
                  </tbody>
            </table>
            <div class="clearfix">
               
                <ul class="pagination">
                    <li class="page-item disabled"><a href="#">Previous</a></li>
                    <li class="page-item"><a href="#" class="page-link">1</a></li>
                    <li class="page-item"><a href="#" class="page-link">Next</a></li>
                </ul>
            </div>
        </div>
    </div>
</div>
